retain_public: true
disable_unused_import_analysis: true
retain_files:
  - Tests/**

targets:
  - SwiftRex
  - SwiftRexOperators
  - SwiftRexSwiftConcurrency
  - SwiftRexCombine
  - SwiftRexRxSwift
  - SwiftRexReactiveSwift
  - SwiftRexReactiveConcurrency
  - SwiftRexSwiftUI
  - SwiftRexArchitecture
  - SwiftRexTesting
  - SwiftRexTests
  - SwiftRexSwiftConcurrencyTests
  - SwiftRexCombineTests
  - SwiftRexRxSwiftTests
  - SwiftRexReactiveSwiftTests
  - SwiftRexReactiveConcurrencyTests
  - SwiftRexArchitectureTests

# Periphery runs its own `swift build --build-tests`; without the traits the gated
# reactive bridge targets (RxSwift/ReactiveSwift/ReactiveConcurrency) fail to link.
build_arguments:
  - --enable-all-traits
