name: Create Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  create-rc:
    name: Create release/${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION — expected X.Y.Z"
            exit 1
          fi

      - name: Ensure branch does not already exist
        run: |
          BRANCH="release/${{ inputs.version }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "::error::Branch $BRANCH already exists"
            exit 1
          fi

      # Keep README SPM install version in sync with the release, on main, before branching the RC.
      - name: Bump README install version to ${{ inputs.version }}
        run: |
          REPO="${{ github.event.repository.name }}"
          sed -i -E "s#(${REPO}\.git\", from: \")[0-9]+\.[0-9]+\.[0-9]+#\1${{ inputs.version }}#g" README.md
          if git diff --quiet README.md; then
            echo "::notice::README already at ${{ inputs.version }}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "docs: bump README install version to ${{ inputs.version }}"
            git push origin main
            echo "::notice::README install version bumped"
          fi

      - name: Create and push release branch
        run: |
          BRANCH="release/${{ inputs.version }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "::notice::Branch $BRANCH created — RC build started automatically"
