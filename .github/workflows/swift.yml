name: CI

on:
  push:
    branches: [full-rewrite, master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test 2>&1

  linux:
    name: Linux
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test 2>&1
