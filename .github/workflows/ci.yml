name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Cache Mint packages
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
          restore-keys: ${{ runner.os }}-mint-

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-homebrew-

      - name: Install Mint
        run: brew install mint

      - name: Install SwiftLint and Periphery
        run: mint bootstrap

      - name: Lint
        run: mint run swiftlint lint --strict

      - name: Codegen freshness
        run: |
          swift run GenerateLifts Sources/SwiftRex
          git diff --exit-code Sources/SwiftRex/__Generated__

      # --enable-all-traits builds every reactive bridge (RxSwift, ReactiveSwift,
      # ReactiveConcurrency). Without it only the core + always-on bridges compile.
      - name: Build
        run: swift build --enable-all-traits 2>&1

      - name: Test
        run: swift test --enable-all-traits 2>&1

      # Periphery runs its own `swift build --build-tests`. The unconditional reactive
      # *test* targets pull the trait-gated bridges, which fail to link without their
      # reactive libraries — so `.periphery.yml` sets `build_arguments: --enable-all-traits`
      # to build (and analyse) them with the traits on.
      - name: Periphery
        run: mint run periphery scan

  test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: swift build --enable-all-traits 2>&1

      - name: Test
        run: swift test --enable-all-traits 2>&1

  # Non-gating: builds and runs the nested BenchmarkSuite package (which pulls in
  # package-benchmark + jemalloc — kept out of the main package). `continue-on-error`
  # ensures it never blocks a PR; it exists to surface dispatch-throughput and
  # CoW/allocation numbers, not to gate. Baselines/thresholds can be added later.
  benchmarks:
    name: Benchmarks (non-gating)
    runs-on: macos-26
    continue-on-error: true
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Install jemalloc
        run: brew install jemalloc

      - name: Run benchmarks
        working-directory: BenchmarkSuite
        run: swift package --disable-sandbox benchmark --no-progress
