name: Documentation

on:
  push:
    tags: ['v*']
  # Manual clean re-deploy (single artifact) without a new tag — for transient Pages
  # \"Deployment failed, try again later\". Never use `gh run rerun --failed` on a docs run.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: Deploy Documentation
    runs-on: macos-26
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Generate Documentation
        run: |
          swift package \
            --allow-writing-to-directory .docs \
            --enable-all-traits \
            generate-documentation \
            --target SwiftRex \
            --target SwiftRexOperators \
            --target SwiftRexSwiftConcurrency \
            --target SwiftRexCombine \
            --target SwiftRexRxSwift \
            --target SwiftRexReactiveSwift \
            --target SwiftRexReactiveConcurrency \
            --target SwiftRexSwiftUI \
            --target SwiftRexArchitecture \
            --enable-experimental-combined-documentation \
            --enable-experimental-overloaded-symbol-presentation \
            --output-path .docs \
            --transform-for-static-hosting \
            --hosting-base-path SwiftRex

      - name: Redirect site root to /documentation/
        run: |
          cat > .docs/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=./documentation/">
          <link rel="canonical" href="./documentation/">
          <title>SwiftRex — Documentation</title>
          <a href="./documentation/">Redirecting to documentation…</a>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .docs

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
